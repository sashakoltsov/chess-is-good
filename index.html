<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector Mesh Graphics Generator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for in-browser JSX parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #1E1E1E; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        /* Custom Scrollbar for Settings Panel */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        /* Color input styling */
        input[type="color"] { -webkit-appearance: none; border: none; padding: 0; outline: none; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid #e2e8f0; border-radius: 4px; }
        /* Numeric Input reset */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const defaultSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="75" fill="black"/>
            <circle cx="100" cy="100" r="45" fill="white"/>
            <rect x="10" y="80" width="180" height="40" fill="black"/>
        </svg>`;

        const FORMATS = [
            { name: 'Square (1:1)', aspectRatio: 1.0 },
            { name: '4-Sheet / 6-Sheet (1:1.5) [Vertical]', aspectRatio: 0.6666 },
            { name: '12-Sheet (2:1) [Horizontal]', aspectRatio: 2.0 },
            { name: '16-Sheet (1:1.5) [Vertical]', aspectRatio: 0.6666 },
            { name: '48-Sheet (2:1) [Horizontal]', aspectRatio: 2.0 },
            { name: 'Escalator Panel / LEP (~1:2.1)', aspectRatio: 0.476 },
        ];

        const ENV_PRESETS = [
            { id: 'ltr', name: 'Linear Right', css: 'linear-gradient(to right, black, white)' },
            { id: 'rtl', name: 'Linear Left', css: 'linear-gradient(to left, black, white)' },
            { id: 'ttb', name: 'Linear Down', css: 'linear-gradient(to bottom, black, white)' },
            { id: 'btt', name: 'Linear Up', css: 'linear-gradient(to top, black, white)' },
            { id: 'radial-out', name: 'Radial Out', css: 'radial-gradient(circle, black, white)' },
            { id: 'radial-in', name: 'Radial In', css: 'radial-gradient(circle, white, black)' },
            { id: 'shadow-black', name: 'Inner Shadow Black', css: 'radial-gradient(circle, white 30%, black 100%)' },
            { id: 'shadow-white', name: 'Inner Shadow White', css: 'radial-gradient(circle, black 30%, white 100%)' },
        ];

        const defaultTargetObject = {
            id: 'obj-' + Date.now(),
            name: 'New Layer',
            isExpanded: true,
            isVisible: true,
            inputType: 'svg', // 'svg' or 'image'
            svgInput: defaultSVG,
            imageInput: null,
            processMode: 'silhouette', // 'silhouette', 'dither', 'adaptive', 'original'
            objectScale: 0.85,
            alignH: 'center',
            alignV: 'center',
            offsetX: 0,
            offsetY: 0,
            layerSpreadOffset: 0, 
            borderEnabled: false,
            borderThicknessIndex: 0,
            borderPosition: 'outside',
            borderColour: 'black',
            borderBlurEnabled: false,
            borderBlurAmount: 25,
            // Layer Level Adjustments
            layerShadows: 0,
            layerMidtones: 1.0,
            layerHighlights: 100,
            layerOutputBlack: 0,
            layerOutputWhite: 100
        };

        const ensureSvgDimensions = (svgStr) => {
            if (!svgStr || !svgStr.includes('<svg')) return svgStr;
            try {
                const parser = new DOMParser();
                const doc = parser.parseFromString(svgStr, "image/svg+xml");
                const svgEl = doc.documentElement;
                if (svgEl.tagName.toLowerCase() !== 'svg') return svgStr;

                let w = svgEl.getAttribute('width');
                let h = svgEl.getAttribute('height');
                const vb = svgEl.getAttribute('viewBox');

                if ((!w || !h || w.includes('%') || h.includes('%')) && vb) {
                    const parts = vb.split(/[\s,]+/).map(parseFloat);
                    if (parts.length >= 4) {
                        svgEl.setAttribute('width', parts[2]);
                        svgEl.setAttribute('height', parts[3]);
                    }
                }
                return new XMLSerializer().serializeToString(doc);
            } catch (e) {
                return svgStr;
            }
        };

        const parseGraphicSvgString = (text) => {
            if (!text || !text.trim()) return { innerContent: '', viewBox: '0 0 100 100', origW: 100, origH: 100, minX: 0, minY: 0 };
            try {
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, "image/svg+xml");
                const svgEl = doc.documentElement;
                if (svgEl.tagName.toLowerCase() !== 'svg') return { innerContent: '', viewBox: '0 0 100 100', origW: 100, origH: 100, minX: 0, minY: 0 };

                let viewBox = svgEl.getAttribute('viewBox');
                let origW = 100, origH = 100, minX = 0, minY = 0;
                if (viewBox) {
                    const vbParts = viewBox.split(/[\s,]+/).map(parseFloat);
                    minX = vbParts[0] || 0;
                    minY = vbParts[1] || 0;
                    origW = Math.max(1, vbParts[2] || 100);
                    origH = Math.max(1, vbParts[3] || 100);
                } else {
                    origW = Math.max(1, parseFloat(svgEl.getAttribute('width')) || 100);
                    origH = Math.max(1, parseFloat(svgEl.getAttribute('height')) || 100);
                    viewBox = `0 0 ${origW} ${origH}`;
                }

                const elements = doc.querySelectorAll('*');
                elements.forEach(el => {
                    if (el.hasAttribute('fill') && el.getAttribute('fill') !== 'none') el.removeAttribute('fill');
                    if (el.hasAttribute('stroke') && el.getAttribute('stroke') !== 'none') el.removeAttribute('stroke');
                    if (el.style.fill && el.style.fill !== 'none') el.style.fill = '';
                    if (el.style.stroke && el.style.stroke !== 'none') el.style.stroke = '';
                });
                return { viewBox, origW, origH, minX, minY, innerContent: svgEl.innerHTML };
            } catch (e) {
                return { innerContent: '', viewBox: '0 0 100 100', origW: 100, origH: 100, minX: 0, minY: 0 };
            }
        };

        const normalizeGraphics = (graphics) => graphics.map(g => {
            if (g.isDefault) return g;
            let currentSvgInput = g.svgInput;
            if (g.isSolid && !currentSvgInput) currentSvgInput = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" /></svg>';
            else if (g.raw && !currentSvgInput) currentSvgInput = g.raw;
            const parsed = parseGraphicSvgString(currentSvgInput);
            return { ...g, svgInput: currentSvgInput, ...parsed };
        });

        const applyLevels = (luma, S, M, H, OB, OW) => {
            let val = luma;
            const s = S / 100, h = H / 100;
            if (h <= s) val = val >= s ? 1 : 0;
            else {
                val = Math.max(0, Math.min(1, (val - s) / (h - s)));
                if (M !== 1.0) val = Math.pow(val, 1.0 / M);
            }
            const ob = OB / 100, ow = OW / 100;
            return val * (ow - ob) + ob;
        };

        const Panel = ({ id, title, isOpen, onToggle, children }) => (
            <div className="border-b border-gray-200">
                <button onClick={() => onToggle(id)} className="w-full px-5 py-4 flex justify-between items-center bg-white hover:bg-gray-50 focus:outline-none transition-colors">
                    <span className="text-sm font-semibold text-gray-700">{title}</span>
                    <svg className={`w-4 h-4 text-gray-400 transition-transform ${isOpen ? 'rotate-180' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7" /></svg>
                </button>
                {isOpen && (
                    <div className="px-5 pb-5 space-y-4 animate-fade-in bg-white">
                        {children}
                    </div>
                )}
            </div>
        );

        const App = () => {
            // Panels state
            const [panels, setPanels] = useState({ layers: true, env: false, graphics: false, grid: false, canvas: false, export: false });

            // Target Objects State
            const [targetObjects, setTargetObjects] = useState([{ ...defaultTargetObject, name: 'Layer 1' }]);
            const [coreModuleIndex, setCoreModuleIndex] = useState(0); 

            // Environment State
            const [bgInput, setBgInput] = useState(null); 
            const [envShadows, setEnvShadows] = useState(0);
            const [envHighlights, setEnvHighlights] = useState(100);
            const [envMidtones, setEnvMidtones] = useState(1.0);
            const [envOutputBlack, setEnvOutputBlack] = useState(0);
            const [envOutputWhite, setEnvOutputWhite] = useState(100);
            
            // Dual Custom Graphics Libraries
            const [graphicsBlack, setGraphicsBlack] = useState([{ id: 'default-black', isDefault: true, isVisible: true, ratio: 100, targetLevels: [...Array(20).keys()], baseFill: '#000000' }]);
            const [graphicsWhite, setGraphicsWhite] = useState([{ id: 'default-white', isDefault: true, isVisible: true, ratio: 100, targetLevels: [...Array(20).keys()], baseFill: '#ffffff' }]);

            // Canvas Setup & Margins
            const [format, setFormat] = useState(FORMATS[0].aspectRatio);
            const [customW, setCustomW] = useState(1080);
            const [customH, setCustomH] = useState(1080);
            const [marginTop, setMarginTop] = useState(10);
            const [marginBottom, setMarginBottom] = useState(10);
            const [marginLeft, setMarginLeft] = useState(10);
            const [marginRight, setMarginRight] = useState(10);
            const [marginColor, setMarginColor] = useState('#ef4444');

            // Grid Structure
            const [baseResolution, setBaseResolution] = useState(1200);
            const [minSquareSize, setMinSquareSize] = useState(6);
            const [subdivisions, setSubdivisions] = useState(4);
            const [transitionSpread, setTransitionSpread] = useState(25);
            const [invertChecker, setInvertChecker] = useState(false);
            const [transitionCurve, setTransitionCurve] = useState(1.0);
            
            // Preview & Export State
            const [fastPreview, setFastPreview] = useState(true);
            const [pngResolution, setPngResolution] = useState(2000);
            const [previewUrl, setPreviewUrl] = useState(null);
            const [baseSvgCode, setBaseSvgCode] = useState("");
            const [isGenerating, setIsGenerating] = useState(false);
            const [stats, setStats] = useState({ elements: 0, width: 0, height: 0 });

            // History Stack
            const [history, setHistory] = useState([]);
            const [historyIndex, setHistoryIndex] = useState(-1);
            const isUndoRedoRef = useRef(false);

            const safeCoreIndex = Math.min(coreModuleIndex, subdivisions);

            useEffect(() => {
                if (coreModuleIndex > subdivisions) setCoreModuleIndex(subdivisions);
                setTargetObjects(prev => prev.map(obj => ({
                    ...obj,
                    borderThicknessIndex: Math.min(obj.borderThicknessIndex, subdivisions)
                })));
            }, [minSquareSize, subdivisions]);

            // Serialize current state for History
            const currentStateObj = {
                targetObjects, bgInput, envShadows, envHighlights, envMidtones, envOutputBlack, envOutputWhite,
                graphicsBlack, graphicsWhite, format, customW, customH, marginTop, marginBottom,
                marginLeft, marginRight, marginColor, baseResolution, minSquareSize, subdivisions, transitionSpread, invertChecker, transitionCurve
            };
            const currentStateJson = JSON.stringify(currentStateObj);

            useEffect(() => {
                const timer = setTimeout(() => {
                    updatePreview();
                    if (isUndoRedoRef.current) {
                        isUndoRedoRef.current = false;
                    } else {
                        setHistory(prev => {
                            const newHistory = prev.slice(0, historyIndex + 1);
                            if (newHistory.length > 0 && newHistory[newHistory.length - 1] === currentStateJson) return newHistory;
                            newHistory.push(currentStateJson);
                            if (newHistory.length > 50) newHistory.shift(); 
                            return newHistory;
                        });
                        setHistoryIndex(prev => prev + 1 > 49 ? 49 : prev + 1);
                    }
                }, 300);
                return () => clearTimeout(timer);
            }, [currentStateJson, fastPreview]);

            const applyState = (config) => {
                if (config.targetObjects !== undefined) setTargetObjects(config.targetObjects);
                if (config.bgInput !== undefined) setBgInput(config.bgInput);
                if (config.envShadows !== undefined) setEnvShadows(config.envShadows);
                if (config.envHighlights !== undefined) setEnvHighlights(config.envHighlights);
                if (config.envMidtones !== undefined) setEnvMidtones(config.envMidtones);
                if (config.envOutputBlack !== undefined) setEnvOutputBlack(config.envOutputBlack);
                if (config.envOutputWhite !== undefined) setEnvOutputWhite(config.envOutputWhite);
                if (config.graphicsBlack !== undefined) setGraphicsBlack(config.graphicsBlack);
                if (config.graphicsWhite !== undefined) setGraphicsWhite(config.graphicsWhite);
                if (config.format !== undefined) setFormat(config.format);
                if (config.customW !== undefined) setCustomW(config.customW);
                if (config.customH !== undefined) setCustomH(config.customH);
                if (config.marginTop !== undefined) setMarginTop(config.marginTop);
                if (config.marginBottom !== undefined) setMarginBottom(config.marginBottom);
                if (config.marginLeft !== undefined) setMarginLeft(config.marginLeft);
                if (config.marginRight !== undefined) setMarginRight(config.marginRight);
                if (config.marginColor !== undefined) setMarginColor(config.marginColor);
                if (config.baseResolution !== undefined) setBaseResolution(config.baseResolution);
                if (config.minSquareSize !== undefined) setMinSquareSize(config.minSquareSize);
                if (config.subdivisions !== undefined) setSubdivisions(config.subdivisions);
                if (config.transitionSpread !== undefined) setTransitionSpread(config.transitionSpread);
                if (config.invertChecker !== undefined) setInvertChecker(config.invertChecker);
                if (config.transitionCurve !== undefined) setTransitionCurve(config.transitionCurve);
            };

            const undo = () => {
                if (historyIndex > 0) {
                    isUndoRedoRef.current = true;
                    const newIndex = historyIndex - 1;
                    setHistoryIndex(newIndex);
                    applyState(JSON.parse(history[newIndex]));
                }
            };

            const redo = () => {
                if (historyIndex < history.length - 1) {
                    isUndoRedoRef.current = true;
                    const newIndex = historyIndex + 1;
                    setHistoryIndex(newIndex);
                    applyState(JSON.parse(history[newIndex]));
                }
            };

            const exportSettings = () => {
                const config = { ...currentStateObj, pngResolution };
                const blob = new Blob([JSON.stringify(config, null, 2)], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `vector-mesh-project-${Date.now()}.json`;
                a.click();
                URL.revokeObjectURL(url);
            };

            const importSettings = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const config = JSON.parse(event.target.result);
                        if (config.targetObjects !== undefined) {
                            setTargetObjects(config.targetObjects.map((obj, i) => ({
                                ...defaultTargetObject, 
                                name: `Layer ${i + 1}`,
                                isExpanded: true,
                                ...obj 
                            })));
                        }
                        if (config.coreModuleIndex !== undefined) setCoreModuleIndex(config.coreModuleIndex);
                        applyState(config);
                        if (config.graphicsBlack !== undefined) setGraphicsBlack(normalizeGraphics(config.graphicsBlack));
                        if (config.graphicsWhite !== undefined) setGraphicsWhite(normalizeGraphics(config.graphicsWhite));
                        if (config.pngResolution !== undefined) setPngResolution(config.pngResolution);
                    } catch (err) {
                        console.error(err);
                        alert("Failed to load project JSON. File might be corrupted.");
                    }
                };
                reader.readAsText(file);
                e.target.value = null; 
            };

            const loadImage = (srcStr, isSvg = false) => {
                return new Promise((resolve) => {
                    if (!srcStr) return resolve(null);
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = () => resolve(null);
                    if (isSvg && srcStr.startsWith('<svg')) {
                        const fixedSvgStr = ensureSvgDimensions(srcStr);
                        const blob = new Blob([fixedSvgStr], {type: 'image/svg+xml'});
                        img.src = URL.createObjectURL(blob);
                    } else if (srcStr.startsWith('data:')) {
                        img.src = srcStr;
                    } else if (isSvg) {
                        try { 
                            const fixedSvgStr = ensureSvgDimensions(srcStr);
                            img.src = "data:image/svg+xml;base64," + btoa(fixedSvgStr); 
                        } 
                        catch(e) { resolve(null); }
                    } else {
                        img.src = srcStr;
                    }
                });
            };

            const applyEnvPreset = (presetId) => {
                const c = document.createElement('canvas');
                c.width = 512; c.height = 512;
                const ctx = c.getContext('2d');
                let g;
                switch(presetId) {
                    case 'ltr': g = ctx.createLinearGradient(0,0,512,0); g.addColorStop(0,'black'); g.addColorStop(1,'white'); break;
                    case 'rtl': g = ctx.createLinearGradient(0,0,512,0); g.addColorStop(0,'white'); g.addColorStop(1,'black'); break;
                    case 'ttb': g = ctx.createLinearGradient(0,0,0,512); g.addColorStop(0,'black'); g.addColorStop(1,'white'); break;
                    case 'btt': g = ctx.createLinearGradient(0,0,0,512); g.addColorStop(0,'white'); g.addColorStop(1,'black'); break;
                    case 'radial-out':
                        g = ctx.createRadialGradient(256,256,0,256,256,360);
                        g.addColorStop(0,'black'); g.addColorStop(1,'white');
                        break;
                    case 'radial-in':
                        g = ctx.createRadialGradient(256,256,0,256,256,360);
                        g.addColorStop(0,'white'); g.addColorStop(1,'black');
                        break;
                    case 'shadow-black':
                        g = ctx.createRadialGradient(256,256,100,256,256,360);
                        g.addColorStop(0,'white'); g.addColorStop(1,'black');
                        break;
                    case 'shadow-white':
                        g = ctx.createRadialGradient(256,256,100,256,256,360);
                        g.addColorStop(0,'black'); g.addColorStop(1,'white');
                        break;
                }
                ctx.fillStyle = g;
                ctx.fillRect(0,0,512,512);
                setBgInput(c.toDataURL('image/png'));
            };

            const getHash = (x, y) => {
                let h = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
                return h - Math.floor(h);
            };

            const getObjTransform = (obj, img, innerW, innerH, offsetX, offsetY) => {
                let drawW = 0, drawH = 0, dx = 0, dy = 0;
                if (!img) return { drawW, drawH, dx, dy };
                
                const imgAspect = img.width / img.height;
                const scaleW = innerW * obj.objectScale;
                const scaleH = innerH * obj.objectScale;
                if (scaleW / imgAspect <= scaleH) {
                    drawW = scaleW; drawH = drawW / imgAspect;
                } else {
                    drawH = scaleH; drawW = drawH * imgAspect;
                }

                const offX_px = innerW * (obj.offsetX / 100);
                if (obj.alignH === 'left') dx = offsetX + offX_px;
                else if (obj.alignH === 'right') dx = offsetX + innerW - drawW + offX_px;
                else dx = offsetX + (innerW - drawW) / 2 + offX_px; 

                const offY_px = innerH * (obj.offsetY / 100);
                if (obj.alignV === 'top') dy = offsetY + offY_px;
                else if (obj.alignV === 'bottom') dy = offsetY + innerH - drawH + offY_px;
                else dy = offsetY + (innerH - drawH) / 2 + offY_px; 

                return { drawW, drawH, dx, dy };
            };

            const createMesh = async (isDraft) => {
                const hasValidLayer = targetObjects.some(t => t.isVisible !== false && ((t.inputType === 'image' && t.imageInput) || (t.inputType !== 'image' && t.svgInput?.trim())));
                if (!hasValidLayer && !bgInput) return null;

                await new Promise(r => setTimeout(r, 10)); // Yield to paint UI

                const W = format === 'custom' ? Math.max(10, customW) : Math.round(baseResolution);
                const H = format === 'custom' ? Math.max(10, customH) : Math.round(baseResolution / format);
                const shortSide = Math.min(W, H); 
                
                const pxMarginLeft = Math.round(shortSide * (marginLeft / 100));
                const pxMarginRight = Math.round(shortSide * (marginRight / 100));
                const pxMarginTop = Math.round(shortSide * (marginTop / 100));
                const pxMarginBottom = Math.round(shortSide * (marginBottom / 100));

                const innerW = Math.max(10, W - pxMarginLeft - pxMarginRight);
                const innerH = Math.max(10, H - pxMarginTop - pxMarginBottom);

                const ideal_S_max = minSquareSize * Math.pow(2, subdivisions);
                const Cols = Math.max(1, Math.round(innerW / ideal_S_max));
                const Rows = Math.max(1, Math.round(innerH / ideal_S_max));
                
                const S_max_x = innerW / Cols;
                const S_max_y = innerH / Rows;
                
                const offsetX = pxMarginLeft;
                const offsetY = pxMarginTop;

                const adaptedMinSize = ((S_max_x + S_max_y) / 2) / Math.pow(2, subdivisions);

                // Load Data
                const loadedImgs = await Promise.all(targetObjects.map(obj => {
                    if (obj.isVisible === false) return Promise.resolve(null);
                    if (obj.inputType === 'image') {
                        if (!obj.imageInput) return Promise.resolve(null);
                        return loadImage(obj.imageInput, false);
                    } else {
                        let svgStr = obj.svgInput?.trim();
                        if (!svgStr) return Promise.resolve(null);
                        return loadImage(svgStr, true);
                    }
                }));

                const imgB = await loadImage(bgInput, false);

                // Create idMap (Stores the topmost layer ID)
                const idCanvas = document.createElement('canvas');
                idCanvas.width = W; idCanvas.height = H;
                const idCtx = idCanvas.getContext('2d', { willReadFrequently: true });
                
                for (let idx = targetObjects.length - 1; idx >= 0; idx--) {
                    const obj = targetObjects[idx];
                    const img = loadedImgs[idx];
                    if (!img || obj.isVisible === false) continue;
                    const { drawW, drawH, dx, dy } = getObjTransform(obj, img, innerW, innerH, offsetX, offsetY);
                    
                    const tempC = document.createElement('canvas');
                    tempC.width = W; tempC.height = H;
                    const tCtx = tempC.getContext('2d');
                    tCtx.drawImage(img, dx, dy, drawW, drawH);
                    
                    tCtx.globalCompositeOperation = 'source-in';
                    tCtx.fillStyle = `rgb(${idx + 1}, 0, 0)`; 
                    tCtx.fillRect(0, 0, W, H);
                    
                    idCtx.drawImage(tempC, 0, 0);
                }
                const idMap = idCtx.getImageData(0, 0, W, H).data;

                // Create Visual Canvas (for Density and Dither sampling)
                const visCanvas = document.createElement('canvas');
                visCanvas.width = W; visCanvas.height = H;
                const visCtx = visCanvas.getContext('2d', { willReadFrequently: true });
                
                for (let idx = targetObjects.length - 1; idx >= 0; idx--) {
                    const obj = targetObjects[idx];
                    const img = loadedImgs[idx];
                    if (!img || obj.isVisible === false) continue;
                    const { drawW, drawH, dx, dy } = getObjTransform(obj, img, innerW, innerH, offsetX, offsetY);
                    visCtx.drawImage(img, dx, dy, drawW, drawH);
                }
                const imgDataVisual = visCtx.getImageData(0, 0, W, H).data;
                const imgDataA = imgDataVisual;

                const canvas = document.createElement('canvas');
                canvas.width = W;
                canvas.height = H;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                
                // Draw Blurred Mask
                ctx.clearRect(0, 0, W, H);
                for (let idx = targetObjects.length - 1; idx >= 0; idx--) {
                    const obj = targetObjects[idx];
                    const img = loadedImgs[idx];
                    if (!img || obj.isVisible === false) continue;
                    
                    const effectiveSpread = Math.max(0, transitionSpread + (obj.layerSpreadOffset || 0));
                    if (effectiveSpread > 0) ctx.filter = `blur(${effectiveSpread}px)`;
                    else ctx.filter = 'none';
                    
                    const { drawW, drawH, dx, dy } = getObjTransform(obj, img, innerW, innerH, offsetX, offsetY);
                    ctx.drawImage(img, dx, dy, drawW, drawH);
                }
                ctx.filter = 'none'; 
                const imgDataMask = ctx.getImageData(0, 0, W, H).data;

                // Draw Env
                ctx.clearRect(0, 0, W, H);
                if (imgB) ctx.drawImage(imgB, offsetX, offsetY, innerW, innerH);
                const imgDataB = ctx.getImageData(0, 0, W, H).data;

                // Compute borders
                const borderLayers = [];
                for (let idx = 0; idx < targetObjects.length; idx++) {
                    const obj = targetObjects[idx];
                    const img = loadedImgs[idx];
                    if (!obj.borderEnabled || !img) continue;

                    const { drawW, drawH, dx, dy } = getObjTransform(obj, img, innerW, innerH, offsetX, offsetY);
                    const objBorderAlpha = new Float32Array(W * H);
                    
                    ctx.clearRect(0, 0, W, H);
                    ctx.drawImage(img, dx, dy, drawW, drawH);
                    const singleImgData = ctx.getImageData(0, 0, W, H).data;

                    const getAlphaMask = (invert, blurRadius) => {
                        const tempC = document.createElement('canvas');
                        tempC.width = W; tempC.height = H;
                        const tCtx = tempC.getContext('2d');
                        if (invert) {
                            tCtx.fillStyle = 'black'; tCtx.fillRect(0,0,W,H);
                            tCtx.globalCompositeOperation = 'destination-out';
                            tCtx.drawImage(img, dx, dy, drawW, drawH);
                        } else {
                            tCtx.drawImage(img, dx, dy, drawW, drawH);
                        }
                        const blurC = document.createElement('canvas');
                        blurC.width = W; blurC.height = H;
                        const bCtxTemp = blurC.getContext('2d', { willReadFrequently: true });
                        bCtxTemp.filter = `blur(${blurRadius}px)`;
                        bCtxTemp.drawImage(tempC, 0, 0);
                        return bCtxTemp.getImageData(0,0,W,H).data;
                    };

                    if (obj.borderBlurEnabled) {
                        let outBlur = null, inBlur = null;
                        if (obj.borderPosition === 'outside' || obj.borderPosition === 'centered') outBlur = getAlphaMask(false, obj.borderBlurAmount);
                        if (obj.borderPosition === 'inside' || obj.borderPosition === 'centered') inBlur = getAlphaMask(true, obj.borderBlurAmount);
                        for (let i = 0; i < W * H; i++) {
                            const idxData = i * 4 + 3;
                            const isOrig = singleImgData[idxData] > 127;
                            let alpha = 0;
                            if (obj.borderPosition === 'outside' && !isOrig) alpha = Math.min(1.0, (outBlur[idxData] / 255) * 2.0); 
                            else if (obj.borderPosition === 'inside' && isOrig) alpha = Math.min(1.0, (inBlur[idxData] / 255) * 2.0);
                            else if (obj.borderPosition === 'centered') alpha = Math.min(1.0, ((isOrig ? inBlur[idxData] : outBlur[idxData]) / 255) * 2.0);
                            objBorderAlpha[i] = alpha;
                        }
                    } else {
                        const safeBorderIndex = Math.min(obj.borderThicknessIndex, subdivisions);
                        const borderSize = adaptedMinSize * Math.pow(2, safeBorderIndex);
                        const effectiveR = obj.borderPosition === 'centered' ? borderSize / 2 : borderSize;
                        let outBlur = null, inBlur = null;
                        if (obj.borderPosition === 'outside' || obj.borderPosition === 'centered') outBlur = getAlphaMask(false, Math.max(1, effectiveR / 1.5));
                        if (obj.borderPosition === 'inside' || obj.borderPosition === 'centered') inBlur = getAlphaMask(true, Math.max(1, effectiveR / 1.5));
                        for (let i = 0; i < W * H; i++) {
                            const idxData = i * 4 + 3;
                            const isOrig = singleImgData[idxData] > 127;
                            let isBorder = false;
                            if (obj.borderPosition === 'outside') { if (outBlur[idxData] > 5 && !isOrig) isBorder = true; }
                            else if (obj.borderPosition === 'inside') { if (isOrig && inBlur[idxData] > 5) isBorder = true; } 
                            else if (obj.borderPosition === 'centered') { if ((outBlur[idxData] > 5 && !isOrig) || (isOrig && inBlur[idxData] > 5)) isBorder = true; }
                            if (isBorder) objBorderAlpha[i] = 1.0;
                        }
                    }
                    
                    borderLayers.push({ alphaData: objBorderAlpha, color: obj.borderColour, isBlurred: obj.borderBlurEnabled });
                }

                // Pre-calculate quadtree SAT
                const sat = new Float64Array((W + 1) * (H + 1));
                const coreDensity = 1.0 - (safeCoreIndex / (subdivisions + 1));
                for (let y = 0; y < H; y++) {
                    let rowSum = 0;
                    for (let x = 0; x < W; x++) {
                        const i = (y * W + x) * 4;
                        const alpha_sharp = imgDataA[i + 3] / 255; 
                        let alpha_blur = imgDataMask[i + 3] / 255;
                        if (alpha_blur > 0 && alpha_blur < 1) alpha_blur = Math.pow(alpha_blur, transitionCurve);
                        
                        let bg_luma = 0;
                        if (imgB) {
                            const bg_r = imgDataB[i], bg_g = imgDataB[i+1], bg_b = imgDataB[i+2], bg_a = imgDataB[i+3] / 255;
                            let raw_luma = bg_a > 0 ? (bg_r * 0.299 + bg_g * 0.587 + bg_b * 0.114) / 255 : 0;
                            bg_luma = applyLevels(raw_luma, envShadows, envMidtones, envHighlights, envOutputBlack, envOutputWhite);
                        }

                        const topLayerId = idMap[i] - 1;
                        let pixelDensity = coreDensity;

                        // Calculate density for adaptive subdivision
                        if (topLayerId >= 0 && topLayerId < targetObjects.length) {
                            const obj = targetObjects[topLayerId];
                            if (obj.processMode === 'adaptive') {
                                const r = imgDataVisual[i], g = imgDataVisual[i+1], b = imgDataVisual[i+2];
                                let raw_luma = (r * 0.299 + g * 0.587 + b * 0.114) / 255;
                                pixelDensity = applyLevels(raw_luma, obj.layerShadows ?? 0, obj.layerMidtones ?? 1, obj.layerHighlights ?? 100, obj.layerOutputBlack ?? 0, obj.layerOutputWhite ?? 100);
                            }
                        }

                        const density_under = bg_luma * (1 - alpha_blur) + pixelDensity * alpha_blur;
                        const finalDensity = density_under * (1 - alpha_sharp) + pixelDensity * alpha_sharp;
                        rowSum += finalDensity;
                        sat[(y + 1) * (W + 1) + (x + 1)] = sat[y * (W + 1) + (x + 1)] + rowSum;
                    }
                }

                const getAverageDensity = (x, y, w, h) => {
                    const x1 = Math.max(0, Math.min(W, Math.floor(x))), y1 = Math.max(0, Math.min(H, Math.floor(y)));
                    const x2 = Math.max(0, Math.min(W, Math.floor(x + w))), y2 = Math.max(0, Math.min(H, Math.floor(y + h)));
                    const area = (x2 - x1) * (y2 - y1);
                    if (area === 0) return 0;
                    const sum = sat[y2 * (W + 1) + x2] - sat[y1 * (W + 1) + x2] - sat[y2 * (W + 1) + x1] + sat[y1 * (W + 1) + x1];
                    return sum / area;
                };

                const rects = [];
                const max_cells = Math.pow(2, subdivisions);
                const draftDepthCutoff = subdivisions >= 4 ? 2 : (subdivisions >= 2 ? 1 : 0);

                const subdivide = (x, y, w, h, gridX, gridY, depth) => {
                    if (depth === 0) {

                    }
                    let avgDensity = getAverageDensity(x, y, w, h);
                    avgDensity = Math.max(0, Math.min(1, avgDensity)); 
                    const targetDepth = Math.floor((1 - avgDensity) * (subdivisions + 1));
                    let safeTargetDepth = Math.max(0, Math.min(subdivisions, targetDepth));
                    
                    if (isDraft) safeTargetDepth = Math.max(draftDepthCutoff, safeTargetDepth);

                    if (depth > safeTargetDepth) {
                        const step = Math.pow(2, depth - 1), hw = w / 2, hh = h / 2;
                        subdivide(x, y, hw, hh, gridX, gridY, depth - 1);
                        subdivide(x + hw, y, hw, hh, gridX + step, gridY, depth - 1);
                        subdivide(x, y + hh, hw, hh, gridX, gridY + step, depth - 1);
                        subdivide(x + hw, y + hh, hw, hh, gridX + step, gridY + step, depth - 1);
                    } else {
                        const parityX = Math.floor(gridX / Math.pow(2, depth)), parityY = Math.floor(gridY / Math.pow(2, depth));
                        rects.push({ x, y, w, h, gridX, gridY, depth, isBlack: (parityX + parityY) % 2 === 0 });
                    }
                };

                for (let c = 0; c < Cols; c++) {
                    for (let r = 0; r < Rows; r++) {
                        subdivide(offsetX + c * S_max_x, offsetY + r * S_max_y, S_max_x, S_max_y, c * max_cells, r * max_cells, subdivisions);
                    }
                }

                const bayer8x8 = [
                    [ 0, 32,  8, 40,  2, 34, 10, 42],
                    [48, 16, 56, 24, 50, 18, 58, 26],
                    [12, 44,  4, 36, 14, 46,  6, 38],
                    [60, 28, 52, 20, 62, 30, 54, 22],
                    [ 3, 35, 11, 43,  1, 33,  9, 41],
                    [51, 19, 59, 27, 49, 17, 57, 25],
                    [15, 47,  7, 39, 13, 45,  5, 37],
                    [63, 31, 55, 23, 61, 29, 53, 21]
                ].map(row => row.map(v => (v + 0.5) / 64));

                let svgCode = `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" preserveAspectRatio="xMidYMid meet">\n`;
                let defsCode = `<defs>\n`;
                let hasDefs = false;
                for (const g of [...graphicsBlack, ...graphicsWhite]) {
                    if (!g.isDefault && g.innerContent) {
                        defsCode += `<g id="${g.id}">${g.innerContent}</g>\n`;
                        hasDefs = true;
                    }
                }
                defsCode += `</defs>\n`;
                if (hasDefs) svgCode += defsCode;
                
                // Draw Margin Base Background Fill
                svgCode += `<rect width="${W}" height="${H}" fill="${marginColor}"/>\n`;
                // Draw Inner Grid White Base Background
                svgCode += `<rect x="${offsetX}" y="${offsetY}" width="${innerW}" height="${innerH}" fill="#ffffff"/>\n`; 
                
                let elementsRendered = 0;
                for (const rect of rects) {
                    let isBlack = rect.isBlack;
                    if (invertChecker) isBlack = !isBlack;

                    const cx = Math.floor(rect.x + rect.w / 2), cy = Math.floor(rect.y + rect.h / 2);
                    const safeX = Math.max(0, Math.min(W - 1, cx)), safeY = Math.max(0, Math.min(H - 1, cy));
                    
                    const centerIdx = (safeY * W + safeX) * 4;
                    const topLayerId = idMap[centerIdx] - 1;

                    if (topLayerId >= 0 && topLayerId < targetObjects.length) {
                        const obj = targetObjects[topLayerId];
                        // Dither mode specifically overrides parity with lightness threshold
                        // (Adaptive Mesh relies strictly on spatial parity but modifies rect size)
                        if (obj.processMode === 'dither') {
                            const r = imgDataVisual[centerIdx], g = imgDataVisual[centerIdx+1], b = imgDataVisual[centerIdx+2];
                            let luma = (r * 0.299 + g * 0.587 + b * 0.114) / 255;
                            luma = applyLevels(luma, obj.layerShadows ?? 0, obj.layerMidtones ?? 1, obj.layerHighlights ?? 100, obj.layerOutputBlack ?? 0, obj.layerOutputWhite ?? 100);
                            const bX = rect.gridX % 8, bY = rect.gridY % 8;
                            const threshold = bayer8x8[bY][bX];
                            isBlack = luma < threshold;
                        }
                    }
                    
                    if (borderLayers.length > 0) {
                        for (let i = 0; i < borderLayers.length; i++) {
                            const layer = borderLayers[i];
                            const bAlpha = layer.alphaData[safeY * W + safeX];
                            if (bAlpha > 0) {
                                let borderHit = false;
                                if (layer.isBlurred) {
                                    const bX = rect.gridX % 8, bY = rect.gridY % 8, threshold = bayer8x8[bY][bX];
                                    if (bAlpha > threshold) borderHit = true;
                                } else { 
                                    if (bAlpha > 0.5) borderHit = true; 
                                }
                                
                                if (borderHit) {
                                    isBlack = layer.color === 'black';
                                    break; 
                                }
                            }
                        }
                    }

                    const activeLibrary = isBlack ? graphicsBlack : graphicsWhite;
                    let validPool = activeLibrary.filter(g => {
                        if (g.isVisible === false) return false;
                        const currentLevels = g.targetLevels || (g.targetLevel === 'all' || g.targetLevel === undefined ? [...Array(20).keys()] : [parseInt(g.targetLevel)]);
                        return currentLevels.includes(rect.depth) && g.ratio > 0;
                    });
                    if (validPool.length === 0) validPool = activeLibrary.filter(g => g.isDefault && g.isVisible !== false);
                    if (validPool.length === 0) validPool = [{ isDefault: true }];
                    let selected = validPool[0];
                    if (validPool.length > 1) {
                        const totalRatio = validPool.reduce((sum, g) => sum + g.ratio, 0), hash = getHash(rect.gridX, rect.gridY);
                        let target = hash * totalRatio;
                        for (const g of validPool) { target -= g.ratio; if (target <= 0) { selected = g; break; } }
                    }

                    const baseW = rect.w + 0.8, baseH = rect.h + 0.8;
                    const defaultBase = isBlack ? '#000000' : '#ffffff';
                    const baseFill = selected.baseFill === undefined ? defaultBase : selected.baseFill;

                    if (baseFill !== 'transparent' && baseFill !== 'none') {
                        svgCode += `<rect x="${rect.x}" y="${rect.y}" width="${baseW}" height="${baseH}" fill="${baseFill}"/>\n`;
                    }
                    if (!selected.isDefault) {
                        const overlayScale = selected.elementScale !== undefined ? selected.elementScale / 100 : 1;
                        const gw = baseW * overlayScale, gh = baseH * overlayScale;
                        const gx = rect.x + (baseW - gw) / 2, gy = rect.y + (baseH - gh) / 2;
                        
                        let origW = selected.origW;
                        let origH = selected.origH;
                        let minX = selected.minX || 0;
                        let minY = selected.minY || 0;

                        if (!origW || !origH) {
                            const vbParts = selected.viewBox ? selected.viewBox.split(/[\s,]+/).map(parseFloat) : [0,0,100,100];
                            minX = vbParts[0] || 0;
                            minY = vbParts[1] || 0;
                            origW = Math.max(1, vbParts[2] || 100);
                            origH = Math.max(1, vbParts[3] || 100);
                        }

                        const scaleX = gw / origW;
                        const scaleY = gh / origH;
                        const scale = Math.min(scaleX, scaleY);
                        
                        const actualW = origW * scale;
                        const actualH = origH * scale;

                        const tx = gx + (gw - actualW) / 2 - (minX * scale);
                        const ty = gy + (gh - actualH) / 2 - (minY * scale);

                        const gFill = selected.fillColor || '#ffffff', gStrokeWidth = selected.borderSize || 0, gStrokeColor = selected.borderColor || '#000000';
                        let styleStr = `fill="${gFill}"`;
                        if (gStrokeWidth > 0) {
                            let paintOrder = 'fill stroke', actualStrokeWidth = gStrokeWidth;
                            if (selected.borderPosition === 'outside') { paintOrder = 'stroke fill'; actualStrokeWidth = gStrokeWidth * 2; }
                            styleStr += ` stroke="${gStrokeColor}" stroke-width="${actualStrokeWidth}" paint-order="${paintOrder}" stroke-linejoin="round"`;
                        }
                        
                        if (selected.innerContent) {
                            svgCode += `<use href="#${selected.id}" xlink:href="#${selected.id}" transform="translate(${tx}, ${ty}) scale(${scale})" ${styleStr} />\n`;
                        } else {
                            svgCode += `<rect x="${gx}" y="${gy}" width="${gw}" height="${gh}" ${styleStr} />\n`;
                        }
                    }
                    elementsRendered++;
                }

                // Add original images on top
                for (let idx = targetObjects.length - 1; idx >= 0; idx--) {
                    const obj = targetObjects[idx];
                    const img = loadedImgs[idx];
                    if (obj.isVisible !== false && obj.processMode === 'original' && img) {
                        const { drawW, drawH, dx, dy } = getObjTransform(obj, img, innerW, innerH, offsetX, offsetY);
                        let hrefStr = img.src;
                        if ((!obj.inputType || obj.inputType === 'svg') && obj.svgInput) {
                            const fixedSvgStr = ensureSvgDimensions(obj.svgInput);
                            hrefStr = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(fixedSvgStr)));
                        }
// Add xlink:href so desktop software can read the embedded data URI
        svgCode += `<image x="${dx}" y="${dy}" width="${drawW}" height="${drawH}" href="${hrefStr}" xlink:href="${hrefStr}" preserveAspectRatio="none" />\n`;
                    }
                }

                svgCode += `</svg>`;
                return { svgCode, elementsRendered, W, H };
            };

            const updatePreview = async () => {
                const hasValidLayer = targetObjects.some(t => t.isVisible !== false && ((t.inputType === 'image' && t.imageInput) || (t.inputType !== 'image' && t.svgInput?.trim())));
                if (!hasValidLayer && !bgInput) {
                    setPreviewUrl(null);
                    setBaseSvgCode("");
                    setStats({ elements: 0, width: 0, height: 0 });
                    return;

                setIsGenerating(true);
                try {
                    const result = await createMesh(fastPreview);
                    if (result) {
                        const blob = new Blob([result.svgCode], {type: 'image/svg+xml'});
                        const url = URL.createObjectURL(blob);
                        setPreviewUrl(oldUrl => { if(oldUrl) URL.revokeObjectURL(oldUrl); return url; });
                        setBaseSvgCode(result.svgCode);
                        setStats({ elements: result.elementsRendered, width: result.W, height: result.H });
                    }
                } catch(e) {
                    console.error("Failed to generate preview:", e);
                } finally {
                    setIsGenerating(false);
                }
            };

            const handleTargetSvgUpload = (e, id) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => updateTargetObject(id, 'svgInput', event.target.result);
                reader.readAsText(file);
                e.target.value = null;
            };

            const handleTargetImageUpload = (e, id) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => updateTargetObject(id, 'imageInput', event.target.result);
                reader.readAsDataURL(file);
                e.target.value = null;
            };

            const handleBgUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => setBgInput(event.target.result);
                reader.readAsDataURL(file);

            };

            // ---- GRAPHIC LIBRARY HANDLERS ----
            const handleAddGraphic = (type) => {

                const parsed = parseGraphicSvgString(defaultSvg);

                    fillColor: type === 'black' ? '#ffffff' : '#000000',

                }, ...prev]);

            const downloadFinalSvg = async () => {

            const downloadFinalPng = async () => {

                    const url = URL.createObjectURL(svgBlob);
                    
                    await new Promise((resolve, reject) => {
                        img.onload = () => {
                            ctx.fillStyle = '#ffffff';
                            ctx.fillRect(0, 0, exportW, exportH);
                            ctx.drawImage(img, 0, 0, exportW, exportH);
                            
                            canvas.toBlob((blob) => {
                                const a = document.createElement('a');
                                a.href = URL.createObjectURL(blob);

                                document.body.appendChild(a);
                                a.click();
                                document.body.removeChild(a);
                                URL.revokeObjectURL(a.href);

                            }, 'image/png');
                            URL.revokeObjectURL(url);
                        };

                                    <label className="flex items-center space-x-2 cursor-pointer"><input type="checkbox" checked={invertChecker} onChange={(e) => setInvertChecker(e.target.checked)} className="rounded text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer" /><span className="text-sm text-gray-700 font-medium">Invert Global Checker Parity</span></label>
                                </div>
                            </Panel>

                            <Panel id="canvas" title="5. Canvas & Margins" isOpen={panels.canvas} onToggle={togglePanel}>
                                <select className="w-full p-2 text-sm border border-gray-300 rounded-md bg-white focus:ring-2 focus:ring-blue-500 outline-none" value={format} onChange={(e) => setFormat(e.target.value === 'custom' ? 'custom' : parseFloat(e.target.value))}>
                                    {FORMATS.map(f => <option key={f.name} value={f.aspectRatio}>{f.name}</option>)}
                                    <option value="custom">Custom Dimensions (px)</option>
                                </select>
                                
                                {format === 'custom' && (
                                    <div className="grid grid-cols-2 gap-3 pt-2">
                                        <div>
                                            <span className="text-[10px] text-gray-500 font-bold uppercase block mb-1">Width (px)</span>
                                            <input type="number" value={customW} onChange={(e) => setCustomW(parseInt(e.target.value) || 0)} className="w-full p-1.5 text-xs border border-gray-300 rounded bg-white focus:outline-none focus:ring-1 focus:ring-blue-500" />
                                        </div>
                                        <div>
                                            <span className="text-[10px] text-gray-500 font-bold uppercase block mb-1">Height (px)</span>
                                            <input type="number" value={customH} onChange={(e) => setCustomH(parseInt(e.target.value) || 0)} className="w-full p-1.5 text-xs border border-gray-300 rounded bg-white focus:outline-none focus:ring-1 focus:ring-blue-500" />
                                        </div>
                                    </div>
                                )}

                                <div className="grid grid-cols-2 gap-3 pt-3 border-t border-gray-100 mt-3">
                                    {[["marginTop", setMarginTop, "Top"], ["marginBottom", setMarginBottom, "Bottom"], ["marginLeft", setMarginLeft, "Left"], ["marginRight", setMarginRight, "Right"]].map(([key, setter, label]) => (
                                        <div key={key}>
                                            <div className="flex justify-between items-center mb-1">
                                                <span className="text-[10px] text-gray-500 font-medium uppercase">{label}</span>
                                                <div className="flex items-center">
                                                    <input type="number" min="0" max="40" step="1" value={eval(key)} onChange={(e) => setter(parseInt(e.target.value) || 0)} className="w-10 text-right text-[10px] font-mono border border-gray-200 rounded px-1 outline-none focus:border-gray-500" />
                                                    <span className="text-[10px] text-gray-400 ml-0.5">%</span>
                                                </div>
                                            </div>
                                            <input type="range" min="0" max="40" step="1" value={eval(key)} onChange={(e) => setter(parseInt(e.target.value))} className="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-gray-500" />
                                        </div>
                                    ))}
                                </div>

                                <div className="pt-3 border-t border-gray-100 mt-3">
                                    <div className="flex items-center justify-between mb-1">
                                        <span className="text-[10px] text-gray-500 font-bold uppercase block mb-1">Margin Background Fill</span>
                                        <div className="flex items-center gap-2">
                                            <input type="color" value={marginColor} onChange={(e) => setMarginColor(e.target.value)} className="w-7 h-7 rounded cursor-pointer border border-gray-300" />
                                            <span className="text-[10px] font-mono text-gray-400">{marginColor.toUpperCase()}</span>
                                        </div>
                                    </div>
                                </div>
                            </Panel>

                            <Panel id="export" title="6. Export Settings" isOpen={panels.export} onToggle={togglePanel}>
                                <div>
                                    <div className="flex justify-between items-center mb-1">
                                        <span className="text-[10px] text-gray-500 font-medium uppercase">PNG Resolution (Shorter Edge)</span>
                                        <div className="flex items-center">
                                            <input type="number" min="500" max="5000" step="100" value={pngResolution} onChange={(e) => setPngResolution(parseInt(e.target.value) || 1000)} className="w-16 text-right text-[10px] font-mono border border-gray-200 rounded px-1 py-0.5 outline-none focus:border-blue-600" />
                                            <span className="text-[10px] text-gray-400 ml-1">px</span>
                                        </div>
                                    </div>
                                    <input type="range" min="1000" max="3000" step="100" value={pngResolution} onChange={(e) => setPngResolution(parseInt(e.target.value))} className="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                                </div>
                            </Panel>

                        </div>
                        <div className="absolute bottom-0 left-0 right-0 p-5 bg-white border-t border-gray-200 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-20 flex gap-3">
                            <button onClick={downloadFinalSvg} disabled={!baseSvgCode || isGenerating} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-3 rounded-md shadow transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center text-xs">
                                <svg className="w-3.5 h-3.5 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>SVG
                            </button>
                            <button onClick={downloadFinalPng} disabled={!baseSvgCode || isGenerating} className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2 px-3 rounded-md shadow transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center text-xs">
                                <svg className="w-3.5 h-3.5 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>PNG
                            </button>
                        </div>
                    </div>
                    <div className="flex-1 relative flex flex-col bg-[#1E1E1E] overflow-hidden min-h-0 min-w-0">
                        <div className="absolute top-4 right-4 bg-gray-800/90 backdrop-blur-md px-4 py-2 border border-gray-700 rounded-lg shadow-lg z-40 flex items-center gap-4 text-xs font-medium text-gray-300 pointer-events-auto shadow-[0_4px_20px_rgba(0,0,0,0.5)]">
                            <div className="flex items-center gap-1.5 border-r border-gray-600 pr-4">
                                <button onClick={undo} disabled={historyIndex <= 0} className="text-gray-400 hover:text-white disabled:opacity-30 disabled:hover:text-gray-400 transition-colors" title="Undo (Revert settings)">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>
                                </button>
                                <button onClick={redo} disabled={historyIndex >= history.length - 1} className="text-gray-400 hover:text-white disabled:opacity-30 disabled:hover:text-gray-400 transition-colors" title="Redo">
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 10h-10a8 8 0 00-8 8v2M21 10l-6 6m6-6l-6-6"/></svg>
                                </button>
                            </div>
                            <label className="flex items-center cursor-pointer gap-2 hover:text-white transition-colors" title="Render at lower detail for instant feedback">
                                <span>Fast Preview</span>
                                <div className={`w-8 h-4 rounded-full p-0.5 transition-colors ${fastPreview ? 'bg-blue-500' : 'bg-gray-600'}`}>
                                    <div className={`bg-white w-3 h-3 rounded-full shadow-sm transform transition-transform ${fastPreview ? 'translate-x-4' : 'translate-x-0'}`}></div>
                                </div>
                                <input type="checkbox" className="hidden" checked={fastPreview} onChange={(e) => setFastPreview(e.target.checked)} />
                            </label>
                            <div className="w-px h-4 bg-gray-600"></div>
                            <div>Output: <span className="text-white font-mono">{stats.width} × {stats.height}</span></div>
                            <div className="w-px h-4 bg-gray-600"></div>
                            <div>Modules: <span className="text-white font-mono">{stats.elements.toLocaleString()}</span></div>
                        </div>
                        <div className="flex-1 w-full h-full flex items-center justify-center relative p-8 md:p-12 min-h-0 min-w-0">
                            {isGenerating && (
                                <div className="absolute inset-0 bg-black/60 backdrop-blur-[2px] z-50 flex items-center justify-center">
                                    <div className="bg-gray-900 p-4 rounded-xl shadow-2xl border border-gray-700 flex items-center space-x-3 text-sm font-semibold text-white">
                                        <svg className="animate-spin h-5 w-5 text-blue-500" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none" /><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                        <span>Meshing Geometry...</span>
                                    </div>
                                </div>
                            )}
                            {previewUrl && <img src={previewUrl} className="w-auto h-auto max-w-full max-h-full object-contain shadow-[0_0_80px_rgba(255,255,255,0.05)]" alt="Preview" />}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
