                                    <label className="flex items-center justify-center w-full px-4 py-2 border-2 border-dashed border-gray-300 rounded-md cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition-colors">
                                        <svg className="w-5 h-5 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                        <span className="text-sm text-gray-600 font-medium">{bgInput ? 'Replace Texture' : 'Upload Raster Map'}</span>
                                        <input type="file" accept="image/png, image/jpeg, image/webp" className="hidden" onChange={handleBgUpload} />
                                    </label>
                                </div>
                                {bgInput && (
                                    <div className="space-y-4 pt-2 animate-fade-in bg-gray-50 p-4 rounded-lg border border-gray-100">
                                        <p className="text-xs font-semibold text-gray-700 border-b border-gray-200 pb-1">Input Levels</p>
                                        <div>
                                            <div className="flex justify-between mb-1">
                                                <span className="text-[10px] text-gray-500 font-medium uppercase">Shadows (Black Point)</span>
                                                <span className="text-[10px] font-mono bg-white px-1 border border-gray-200 rounded">{envShadows}%</span>
                                            </div>
                                            <input type="range" min="0" max="99" step="1" value={envShadows} onChange={(e) => setEnvShadows(parseInt(e.target.value))} className="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-gray-800" />
                                        </div>
                                        <div>
                                            <div className="flex justify-between mb-1">
                                                <span className="text-[10px] text-gray-500 font-medium uppercase">Midtones (Gamma)</span>
                                                <span className="text-[10px] font-mono bg-white px-1 border border-gray-200 rounded">{envMidtones.toFixed(2)}</span>
                                            </div>
                                            <input type="range" min="0.1" max="3.0" step="0.1" value={envMidtones} onChange={(e) => setEnvMidtones(parseFloat(e.target.value))} className="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-gray-500" />
                                        </div>
                                        <div>
                                            <div className="flex justify-between mb-1">
                                                <span className="text-[10px] text-gray-500 font-medium uppercase">Highlights (White Point)</span>
                                                <span className="text-[10px] font-mono bg-white px-1 border border-gray-200 rounded">{envHighlights}%</span>
                                            </div>
                                            <input type="range" min="1" max="100" step="1" value={envHighlights} onChange={(e) => setEnvHighlights(parseInt(e.target.value))} className="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-gray-300" />
                                        </div>
                                        <p className="text-xs font-semibold text-gray-700 border-b border-gray-200 pt-2 pb-1">Output Levels</p>
                                        <div>
                                            <div className="flex justify-between mb-1">
                                                <span className="text-[10px] text-gray-500 font-medium uppercase">Output Black</span>
                                                <span className="text-[10px] font-mono bg-white px-1 border border-gray-200 rounded">{envOutputBlack}%</span>
                                            </div>
                                            <input type="range" min="0" max="100" step="1" value={envOutputBlack} onChange={(e) => setEnvOutputBlack(parseInt(e.target.value))} className="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-gray-800" />
                                        </div>
                                        <div>
                                            <div className="flex justify-between mb-1">
                                                <span className="text-[10px] text-gray-500 font-medium uppercase">Output White</span>
                                                <span className="text-[10px] font-mono bg-white px-1 border border-gray-200 rounded">{envOutputWhite}%</span>
                                            </div>
                                            <input type="range" min="0" max="100" step="1" value={envOutputWhite} onChange={(e) => setEnvOutputWhite(parseInt(e.target.value))} className="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-gray-300" />
                                        </div>
                                        <button onClick={() => setBgInput(null)} className="text-xs text-red-600 hover:text-red-800 font-medium w-full text-center pt-3 border-t border-gray-200 mt-2">✕ Remove Background Map</button>
                                    </div>
                                )}
                            </div>
                            <hr className="border-gray-100" />
                            <div className="space-y-4">
                                <label className="block text-sm font-semibold text-gray-700">3. Canvas & Margins</label>
                                <select className="w-full p-2 text-sm border border-gray-300 rounded-md bg-white focus:ring-2 focus:ring-blue-500 outline-none" value={format} onChange={(e) => setFormat(parseFloat(e.target.value))}>
                                    {FORMATS.map(f => <option key={f.name} value={f.aspectRatio}>{f.name}</option>)}
                                </select>
                                <div className="grid grid-cols-2 gap-3 pt-2">
                                    {[["marginTop", setMarginTop, "Top"], ["marginBottom", setMarginBottom, "Bottom"], ["marginLeft", setMarginLeft, "Left"], ["marginRight", setMarginRight, "Right"]].map(([key, setter, label]) => (
                                        <div key={key}>
                                            <div className="flex justify-between mb-1">
                                                <span className="text-[10px] text-gray-500 font-medium uppercase">{label}</span>
                                                <span className="text-[10px] font-mono bg-white px-1 border border-gray-200 rounded">{eval(key)}%</span>
                                            </div>
                                            <input type="range" min="0" max="40" step="1" value={eval(key)} onChange={(e) => setter(parseInt(e.target.value))} className="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-gray-500" />
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <hr className="border-gray-100" />
                            <div className="space-y-5">
                                <label className="block text-sm font-semibold text-gray-700">4. Grid Structure</label>
                                <div>
                                    <div className="flex justify-between mb-1"><span className="text-xs text-gray-500 font-medium">Smallest Square Size</span><span className="text-xs font-mono bg-gray-100 px-1 rounded">{minSquareSize}px</span></div>
                                    <input type="range" min="2" max="24" step="2" value={minSquareSize} onChange={(e) => setMinSquareSize(parseInt(e.target.value))} className="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                                </div>
                                <div>
                                    <div className="flex justify-between mb-1"><span className="text-xs text-gray-500 font-medium">Biggest Square Multiplier</span><span className="text-xs font-mono bg-gray-100 px-1 rounded">{Math.pow(2, subdivisions)}x</span></div>
                                    <input type="range" min="1" max="6" step="1" value={subdivisions} onChange={(e) => setSubdivisions(parseInt(e.target.value))} className="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                                </div>
                                <div>
                                    <div className="flex justify-between mb-1"><span className="text-xs text-gray-500 font-medium">Mask Blur</span><span className="text-xs font-mono bg-gray-100 px-1 rounded">{transitionSpread}</span></div>
                                    <input type="range" min="0" max="150" step="5" value={transitionSpread} onChange={(e) => setTransitionSpread(parseInt(e.target.value))} className="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                                </div>
                                <div className="space-y-2 mt-2 border-t border-gray-100 pt-3">
                                    <label className="flex items-center space-x-2 cursor-pointer"><input type="checkbox" checked={invertChecker} onChange={(e) => setInvertChecker(e.target.checked)} className="rounded text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer" /><span className="text-sm text-gray-700 font-medium">Invert Global Checker Parity</span></label>
                                </div>
                            </div>
                            <hr className="border-gray-100" />
                            <div className="space-y-4">
                                <label className="block text-sm font-semibold text-gray-700">5. Graphics Libraries</label>
                                {renderLibrary('black', 'Dark Modules (Primary)', graphicsBlack)}
                                {renderLibrary('white', 'Light Modules (Secondary)', graphicsWhite)}
                            </div>
                            <hr className="border-gray-100" />
                            <div className="space-y-4">
                                <label className="block text-sm font-semibold text-gray-700">6. Export Settings</label>
                                <div>
                                    <div className="flex justify-between mb-1">
                                        <span className="text-[10px] text-gray-500 font-medium uppercase">PNG Resolution (Shorter Edge)</span>
                                        <span className="text-[10px] font-mono bg-white px-1 border border-gray-200 rounded">{pngResolution}px</span>
                                    </div>
                                    <input type="range" min="1000" max="3000" step="100" value={pngResolution} onChange={(e) => setPngResolution(parseInt(e.target.value))} className="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                                </div>
                            </div>
                        </div>
                        <div className="absolute bottom-0 left-0 right-0 p-5 bg-white border-t border-gray-200 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-20 flex gap-3">
                            <button onClick={downloadFinalSvg} disabled={!baseSvgCode || isGenerating} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-3 rounded-md shadow transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center text-xs">
                                <svg className="w-3.5 h-3.5 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>SVG
                            </button>
                            <button onClick={downloadFinalPng} disabled={!baseSvgCode || isGenerating} className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2 px-3 rounded-md shadow transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center text-xs">
                                <svg className="w-3.5 h-3.5 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>PNG
                            </button>
                        </div>
                    </div>
                    <div className="flex-1 relative flex flex-col bg-[#1E1E1E] overflow-hidden min-h-0 min-w-0">
                        <div className="absolute top-4 right-4 bg-gray-800/90 backdrop-blur-md px-4 py-2 border border-gray-700 rounded-lg shadow-lg z-40 flex gap-4 text-xs font-medium text-gray-300 pointer-events-none">
                            <div>Output Res: <span className="text-white font-mono">{stats.width} × {stats.height}</span></div>
                            <div className="w-px bg-gray-600"></div>
                            <div>Modules: <span className="text-white font-mono">{stats.elements.toLocaleString()}</span></div>
                        </div>
                        <div className="flex-1 w-full h-full flex items-center justify-center relative p-8 md:p-12 min-h-0 min-w-0">
                            {isGenerating && (
                                <div className="absolute inset-0 bg-black/60 backdrop-blur-[2px] z-50 flex items-center justify-center">
                                    <div className="bg-gray-900 p-4 rounded-xl shadow-2xl border border-gray-700 flex items-center space-x-3 text-sm font-semibold text-white">
                                        <svg className="animate-spin h-5 w-5 text-blue-500" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none" /><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                        <span>Meshing Geometry...</span>
                                    </div>
                                </div>
                            )}
                            {previewUrl && <img src={previewUrl} className="w-auto h-auto max-w-full max-h-full object-contain shadow-[0_0_80px_rgba(255,255,255,0.05)]" alt="Preview" />}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
